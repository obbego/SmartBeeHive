<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio Arnia - Smart Hive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/arnie.css" />

  <style>
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    p {
      margin-bottom: 0;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>
  <header class="mb-4 py-3 border-bottom border-secondary border-opacity-25" style="background: rgba(15, 23, 42, 0.3);">
    <div class="container d-flex justify-content-between align-items-center">
      <h1>
        <a href="index.html" class="text-white me-3" style="opacity: 0.8; transition: 0.2s;"><i
            data-lucide="arrow-left"></i></a>
        <span id="hiveName">Caricamento...</span>
      </h1>
      <div id="lastUpdate" style="font-size: 13px; color: var(--text-muted);">Ultimo dato: --:--</div>
    </div>
  </header>

  <div class="container">
    <div class="row g-4 mb-4">

      <div class="col-lg-6">
        <div class="row g-3">
          <div class="col-6">
            <div class="glass-panel stat-card h-100 text-center">
              <div class="stat-label mb-2 justify-content-center"><i data-lucide="thermometer"></i> Temp In</div>
              <div class="stat-value" id="valTempIn">--</div>
            </div>
          </div>

          <div class="col-6">
            <div class="glass-panel stat-card h-100 text-center">
              <div class="stat-label mb-2 justify-content-center"><i data-lucide="cloud"></i> Temp Out</div>
              <div class="stat-value" id="valTempOut">--</div>
            </div>
          </div>

          <div class="col-6">
            <div class="glass-panel stat-card h-100 text-center">
              <div class="stat-label mb-2 justify-content-center"><i data-lucide="scale"></i> Peso</div>
              <div class="stat-value" id="valWeight">--</div>
            </div>
          </div>

          <div class="col-6">
            <div class="glass-panel stat-card h-100 text-center">
              <div class="stat-label mb-2 justify-content-center"><i data-lucide="droplets"></i> Umidità</div>
              <div class="stat-value" id="valHum">--</div>
            </div>
          </div>
          <div class="col-12">
            <div class="glass-panel stat-card d-flex flex-column justify-content-center px-4" style="height: 100px;">
              <div class="stat-label mb-2"><i data-lucide="archive"></i> Livello Miele</div>
              <div class="honey-tank-wrapper-horizontal">
                <div class="honey-tank-horizontal">
                  <div id="barMiele" class="honey-liquid-horizontal" style="width: 0%"></div>
                </div>
                <span id="valMiele" class="honey-pct-horizontal">--%</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="glass-panel p-4 mb-3">
          <div class="chart-title mb-3">Stato Sensori</div>
          <div id="statusSemaforo" class="status-alert mb-3">
          </div>
          <div
            class="d-flex justify-content-between align-items-center pt-4 mt-3 border-top border-white border-opacity-10">
            <span style="font-size: 13px; color: var(--text-muted);">Affidabilità R² (In/Out):</span>
            <strong id="valR2" class="text-white">0.82</strong>
          </div>
        </div>

        <div class="glass-panel p-0">
          <div class="p-3 d-flex justify-content-between align-items-center alert-header" style="cursor:default;">
            <div class="chart-title mb-0" style="color: var(--danger);">
              Storico Allarmi
            </div>
          </div>

          <div class="border-top border-white border-opacity-10"></div>

          <div id="localHistory" class="history-list p-3 fixed-alert-height"></div>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-5">
      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Temperatura Interna vs Esterna</div>
          <div class="chart-area"><canvas id="tempInOutChart"></canvas></div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Analisi Audio (FFT)</div>
          <div class="chart-area"><canvas id="fftChart"></canvas></div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Variazione Peso (kg/h)</div>
          <div class="chart-area"><canvas id="weightFlowChart"></canvas></div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Umidità Interna</div>
          <div class="chart-area"><canvas id="humidityChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/dati.js"></script>
  <script src="../js/arnie.js"></script>
</body>

</html>

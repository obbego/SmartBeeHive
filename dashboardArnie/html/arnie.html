<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio Arnia - Smart Hive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/arnie.css" />
</head>

<body>
  <header class="py-3 border-bottom border-secondary border-opacity-25 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="btn-back"><i data-lucide="arrow-left"></i> Dashboard</a>
      <h2 id="hiveName" class="mb-0 fw-bold text-white">Caricamento...</h2>
      <div id="lastUpdate" class="small text-muted">Ultimo dato: --:--</div>
    </div>
  </header>

  <div class="container">
    <div class="row g-4">

      <!-- METRICHE -->
      <div class="col-lg-6">
        <div class="row g-3">
          <!-- Riga 1 -->
          <div class="col-6">
            <div class="glass-panel p-3 text-center">
              <div class="stat-label justify-content-center">
                <i data-lucide="thermometer"></i> Temp In
              </div>
              <div class="stat-value fs-2" id="valTempIn">--</div>
            </div>
          </div>

          <div class="col-6">
            <div class="glass-panel p-3 text-center">
              <div class="stat-label justify-content-center">
                <i data-lucide="cloud"></i> Temp Out
              </div>
              <div class="stat-value fs-2" id="valTempOut">--</div>
            </div>
          </div>

          <!-- Riga 2 -->
          <div class="col-6">
            <div class="glass-panel p-3 text-center">
              <div class="stat-label justify-content-center">
                <i data-lucide="scale"></i> Peso
              </div>
              <div class="stat-value fs-2" id="valWeight">--</div>
            </div>
          </div>

          <div class="col-6">
            <div class="glass-panel p-3 text-center">
              <div class="stat-label justify-content-center">
                <i data-lucide="droplets"></i> Umidità
              </div>
              <div class="stat-value fs-2" id="valHum">--</div>
            </div>
          </div>
        </div>
      </div>

      <!-- INFO -->
      <div class="col-lg-6">
        <div class="glass-panel sensor-status-panel p-3 mb-3">
          <h5 class="chart-title mb-2">Stato Sensori</h5>
          <div id="statusSemaforo" class="alert d-flex align-items-center gap-2 border-0"></div>
          <hr class="opacity-10" />
          <div class="d-flex justify-content-between small">
            <span>R² (In/Out):</span> <strong id="valR2">0.82</strong>
          </div>
        </div>
        <div class="glass-panel p-4">
          <h5 class="chart-title text-danger mb-3">Allarmi Recenti</h5>
          <div id="localHistory" class="history-list"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="mb-4"></div>

  <!-- Grafici -->
  <div class="container">
    <!-- Riga 1 -->
    <div class="row g-4 mb-4">
      <!-- Grafico Temperatura Interna vs Esterna -->
      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Temperatura Interna vs Esterna</div>
          <div class="chart-area">
            <canvas id="tempInOutChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Grafico Analisi Audio (FFT) -->
      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Analisi Audio (FFT)</div>
          <div class="chart-area">
            <canvas id="fftChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Riga 2 -->
    <div class="row g-4 mb-4">
      <!-- Grafico Derivata Prima Peso -->
      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Derivata Prima Peso</div>
          <div class="chart-area">
            <canvas id="weightFlowChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Grafico Umidità Interna -->
      <div class="col-lg-6">
        <div class="glass-panel chart-box">
          <div class="chart-title">Umidità Interna</div>
          <div class="chart-area">
            <canvas id="humidityChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="../js/dati.js"></script>
  <script src="../js/arnie.js"></script>
</body>

</html>

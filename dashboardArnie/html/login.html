<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login_signup.css">

</head>

<body>
    <header class="mb-4 py-3 border-bottom border-secondary border-opacity-25"
        style="background: rgba(15, 23, 42, 0.3);">
        <div class="container d-flex justify-content-between align-items-center">
            <h1>
                <i data-lucide="layout-grid" class="brand-icon me-2"></i>
                FrontEnd Managment Arnie
            </h1>
        </div>
    </header>

    <div class="container login-wrapper">
        <div class="glass-panel stat-card login-card p-4">
            <div class="text-center mb-4">
                <i data-lucide="shield" style="width:40px;height:40px;"></i>
                <h3 class="mt-2">Accesso Dashboard</h3>
                <p style="color:var(--text-muted);font-size:14px;">
                    Inserisci le tue credenziali
                </p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <input type="email" class="form-control" placeholder="nome@email.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" placeholder="Password" required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-honey fw-semibold">
                        Accedi
                    </button>
                </div>

                <br>
                <div class="text-center mb-4 align=left">
                    <p style="color:var(--text-muted);font-size:14px;">
                        Non hai un account? <a href="signup.html"
                            style="color:var(--text-muted); text-decoration:underline;">Registrati</a>
                    </p>
                </div>
        </div>

        </form>
    </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="../js/dati.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/index.js"></script>

</body>

</html>
